# Per-material run configuration for the DD-RSH-CAM benchmark.
#
# Single source of truth for structure + QE run parameters. Consumed by:
#   scripts/gen_inputs.py     -> generates the 3 QE inputs (PBE / eels / ddrshcam)
#   scripts/run_material.sh   -> end-to-end driver (PBE -> eels -> fit -> ddrshcam)
#   scripts/write_comparison.py -> reads structure (a, ecut) for the parameters table
#
# Experimental gaps and other-method reference values live in scripts/literature.py
# (BENCHMARK dict). `nat`/`ntyp` are derived from positions/species at load time.
#
# Materials are ordered by aexx = 1/eps_inf (covalent -> ionic), matching the
# coverage map in results/EFT-ARPES-bench-comparison.md.

[Si]
prefix = "si"
structure = "diamond"
ibrav = 2
celldm1 = 10.263            # a = 5.431 A (experimental, si.toml)
ecutwfc = 60.0
ecutrho = 240.0
nbnd = 12
kmesh = [8, 8, 8]           # PBE SCF + eels SCF
kmesh_hybrid = [6, 6, 6]    # DD-RSH-CAM SCF
nqx = [6, 6, 6]             # Fock q-grid
edges = ["indirect", "direct"]
species = [{ symbol = "Si", mass = 28.085, pseudo = "Si_ONCV_PBE-1.2.upf" }]
positions = [
  { symbol = "Si", xyz = [0.00, 0.00, 0.00] },
  { symbol = "Si", xyz = [0.25, 0.25, 0.25] },
]

